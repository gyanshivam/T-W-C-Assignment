<!DOCTYPE html>
<html>
 <head>
   <title>ol, ul and dl</title>
   <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width" />
 </head>
  <body>
   <h1>All types of lists in HTML</h1>

   <h2>Ordered Lists first</h2>
  <ol>
    <li>TV</li>
    <li>Laptop</li>
    <li>Phone</li>
    <li>Bike</li>
  </ol>

  <h2>An unordered lists</h2>
  <ul>
    <li>Study</li>
    <li>Work</li>
    <li>Sleep</li>
    <li>Repeat</li>
  </ul>

  <h2>Different jobs</h2>
  <dl>
    <dt>Full time</dt>
    <dd>long duration commitment everyday</dd>

    <dt>Part time</dt>
    <dd>commitment comes but gives flexibility</dd>
  </dl>
  </body>
</html>
