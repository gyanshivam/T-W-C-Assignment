<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Marks Calculator | Dropdown Demo</title>
</head>
<body>

<fieldset>
  <legend><b> Student Marks Entry</b></legend>

  <form action="#" 
        oninput="avg.value = (parseInt(marks1.value) || 0) + (parseInt(marks2.value) || 0) + (parseInt(marks3.value) || 0) + (parseInt(marks4.value) || 0) === 0 ? 0 : 
                 ((parseInt(marks1.value) || 0) + (parseInt(marks2.value) || 0) + (parseInt(marks3.value)|| 0) + (parseInt(marks4.value) || 0) ) / 4">

    <!-- Student Name -->
    <label for="studentName">Student Name:</label><br>
    <input type="text" id="studentName" name="studentName" placeholder="e.g., Gyan Abhijeet" required><br><br>

    <!-- Subject 1 -->
    <label>Subject 1:</label><br>
    <select name="subject1" id="subject1">
      <option value="Mathematics">Mathematics</option>
      <option value="Physics">Physics</option>
      <option value="Chemistry">Chemistry</option>
      <option value="Biology">Biology</option>
      <option value="Computer Science">Computer Science</option>
    </select>
    <input type="number" id="marks1" name="marks1" placeholder="80" min="0" max="100" step="1"><br><br>

    <!-- Subject 2 -->
    <label>Subject 2:</label><br>
    <select name="subject2" id="subject2">
      <option value="Mathematics">Mathematics</option>
      <option value="Physics">Physics</option>
      <option value="Chemistry">Chemistry</option>
      <option value="Biology">Biology</option>
      <option value="Computer Science">Computer Science</option>
    </select>
    <input type="number" id="marks2" name="marks2" placeholder="80" min="0" max="100" step="1"><br><br>

    <!-- Subject 3 -->
    <label>Subject 3:</label><br>
    <select name="subject3" id="subject3">
      <option value="Mathematics">Mathematics</option>
      <option value="Physics">Physics</option>
      <option value="Chemistry">Chemistry</option>
      <option value="Biology">Biology</option>
      <option value="Computer Science">Computer Science</option>
    </select>
    <input type="number" id="marks3" name="marks3" placeholder="80" min="0" max="100" step="1"><br><br>

     <!-- Subject 4 -->
    <label>Subject 4:</label><br>
    <select name="subject3" id="subject3">
      <option value="Mathematics">Mathematics</option>
      <option value="Physics">Physics</option>
      <option value="Chemistry">Chemistry</option>
      <option value="Biology">Biology</option>
      <option value="Computer Science">Computer Science</option>
    </select>
    <input type="number" id="marks4" name="marks4" placeholder="80" min="0" max="100" step="1"><br><br>

    <!-- Average display (output) -->
    <label>Average Marks:</label>
    <output name="avg" for="marks1 marks2 marks3 marks4">0</output>
    <br><br>

    <!-- Reset button (optional) -->
    <input type="reset" value="Clear Form">
  </form>
</fieldset>

<p><strong>How to use:</strong> Select a subject from each dropdown, enter marks (0‑100) for each subject. The average will update automatically. Empty fields are treated as 0.</p>

</body>
</html>
